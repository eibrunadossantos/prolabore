document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

#C9A02A; color:#D9B24A; border-radius:2px; padding:7px 16px;\">Aula gratuita + planilha<\u002Fspan>\n      <\u002Fdiv>\n      <h1 style=\"font-family:'Cormorant Garamond',serif; font-weight:400; font-size:clamp(38px,6vw,72px); line-height:1.06; letter-spacing:-0.01em; color:#F4F0E8; margin:0 0 26px;\"><span style=\"white-space:nowrap;\">Pró-labore<\u002Fspan> não é o que sobra. É o que você <em style=\"font-style:italic; color:#D9B24A;\">decide.<\u002Fem><\u002Fh1>\n      <p style=\"font-size:clamp(14px,1.5vw,16px); font-weight:300; line-height:1.75; color:#E3DDD3; max-width:540px; margin:0 0 20px;\">Chega de ajustar sua vida pessoal ao que o caixa permite. Com essa calculadora, você entende quanto precisa receber para viver bem do seu negócio e define os ajustes necessários que precisam ser feitos para tornar esse desejo, realidade.<\u002Fp>\n      <p style=\"font-size:clamp(14px,1.5vw,16px); font-weight:500; line-height:1.7; color:#F0EAE0; max-width:540px; margin:0 0 30px;\">Você merece ser bem paga pelo excelente trabalho que entrega!<\u002Fp>\n      <div style=\"display:flex; flex-direction:column; align-items:flex-start; gap:16px;\">\n        <span style=\"display:inline-flex; align-items:center; gap:8px; font-size:11px; font-weight:400; letter-spacing:0.2em; text-transform:uppercase; color:#D9B24A;\"><span style=\"display:inline-block; animation:brunaBounce 2.4s ease-in-out infinite;\">↓<\u002Fspan> Disponível por tempo limitado<\u002Fspan>\n        <a href=\"#captura\" style=\"display:inline-block; height:56px; line-height:56px; padding:0 clamp(28px,4vw,40px); background:#F4F0E8; color:#1A1714; font-size:11px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; text-decoration:none; transition:opacity .35s ease, transform .35s ease;\" style-hover=\"opacity:0.88; transform:translateY(-2px);\">Quero acessar o guia →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- BAND SLATE -->\n  <section data-reveal=\"\" style=\"background:#6B8195; padding:clamp(22px,3vw,30px) clamp(20px,5vw,64px); text-align:center;\">\n    <p style=\"margin:0; font-size:11px; font-weight:400; letter-spacing:0.32em; text-transform:uppercase; color:#EAF0F3;\">Educação Financeira para Mulheres<\u002Fp>\n  <\u002Fsection>\n\n  <!-- BENEFÍCIOS (cards 2x2) -->\n  <section style=\"padding:clamp(56px,9vw,112px) clamp(20px,5vw,64px); background:#F4F0E8;\">\n    <div style=\"max-width:760px; margin:0 auto;\">\n      <p data-reveal=\"\" style=\"font-size:11px; font-weight:500; letter-spacing:0.22em; text-transform:uppercase; color:#B68B22; margin:0 0 clamp(32px,5vw,52px);\">O que você vai aprender:<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:clamp(18px,2.2vw,28px);\">\n        <div data-reveal=\"\" data-reveal-delay=\"0\" style=\"border:1px solid rgba(26,23,20,0.12); padding:clamp(30px,3.5vw,42px); background:#FAF7F1; transition:transform .5s ease, border-color .5s ease, box-shadow .5s ease;\" style-hover=\"transform:translateY(-5px); border-color:rgba(201,160,42,0.5); box-shadow:0 16px 40px rgba(26,23,20,0.07);\">\n          <div style=\"font-family:'Cormorant Garamond',serif; font-weight:300; font-size:clamp(34px,4vw,50px); color:#C9A02A; line-height:1; margin-bottom:22px;\">01<\u002Fdiv>\n          <h3 style=\"font-size:clamp(16px,1.8vw,19px); font-weight:500; color:#1A1714; margin:0 0 12px;\">Tudo sobre pró-labore<\u002Fh3>\n          <p style=\"font-size:14px; font-weight:300; line-height:1.7; color:#7A7268; margin:0;\">Você vai entender o que é, como calcular e o que considerar para definir o seu, sem achismo, com base nos seus números.<\u002Fp>\n        <\u002Fdiv>\n        <div data-reveal=\"\" data-reveal-delay=\"100\" style=\"border:1px solid rgba(26,23,20,0.12); padding:clamp(30px,3.5vw,42px); background:#FAF7F1; transition:transform .5s ease, border-color .5s ease, box-shadow .5s ease;\" style-hover=\"transform:translateY(-5px); border-color:rgba(201,160,42,0.5); box-shadow:0 16px 40px rgba(26,23,20,0.07);\">\n          <div style=\"font-family:'Cormorant Garamond',serif; font-weight:300; font-size:clamp(34px,4vw,50px); color:#C9A02A; line-height:1; margin-bottom:22px;\">02<\u002Fdiv>\n          <h3 style=\"font-size:clamp(16px,1.8vw,19px); font-weight:500; color:#1A1714; margin:0 0 12px;\">Seu pró-labore ideal<\u002Fh3>\n          <p style=\"font-size:14px; font-weight:300; line-height:1.7; color:#7A7268; margin:0;\">Com a calculadora você vai descobrir o valor ideal para sua vida. Se você trabalhasse em uma empresa receberia um salário fixo, o pró-labore tem a mesma finalidade, trazer previsibilidade para seu orçamento pessoal.<\u002Fp>\n        <\u002Fdiv>\n        <div data-reveal=\"\" data-reveal-delay=\"200\" style=\"border:1px solid rgba(26,23,20,0.12); padding:clamp(30px,3.5vw,42px); background:#FAF7F1; transition:transform .5s ease, border-color .5s ease, box-shadow .5s ease;\" style-hover=\"transform:translateY(-5px); border-color:rgba(201,160,42,0.5); box-shadow:0 16px 40px rgba(26,23,20,0.07);\">\n          <div style=\"font-family:'Cormorant Garamond',serif; font-weight:300; font-size:clamp(34px,4vw,50px); color:#C9A02A; line-height:1; margin-bottom:22px;\">03<\u002Fdiv>\n          <h3 style=\"font-size:clamp(16px,1.8vw,19px); font-weight:500; color:#1A1714; margin:0 0 12px;\">O que o seu negócio suporta hoje<\u002Fh3>\n          <p style=\"font-size:14px; font-weight:300; line-height:1.7; color:#7A7268; margin:0;\">Ao final, vai entender se já consegue se pagar sem comprometer a sua operação ou se ajustes precisam ser feitos para que isso possa acontecer todo mês, afinal ele é uma despesa fixa do seu negócio.<\u002Fp>\n        <\u002Fdiv>\n        <div data-reveal=\"\" data-reveal-delay=\"300\" style=\"border:1px solid rgba(26,23,20,0.12); padding:clamp(30px,3.5vw,42px); background:#FAF7F1; transition:transform .5s ease, border-color .5s ease, box-shadow .5s ease;\" style-hover=\"transform:translateY(-5px); border-color:rgba(201,160,42,0.5); box-shadow:0 16px 40px rgba(26,23,20,0.07);\">\n          <div style=\"font-family:'Cormorant Garamond',serif; font-weight:300; font-size:clamp(34px,4vw,50px); color:#C9A02A; line-height:1; margin-bottom:22px;\">04<\u002Fdiv>\n          <h3 style=\"font-size:clamp(16px,1.8vw,19px); font-weight:500; color:#1A1714; margin:0 0 12px;\">Como ajustar e aplicar<\u002Fh3>\n          <p style=\"font-size:14px; font-weight:300; line-height:1.7; color:#7A7268; margin:0;\">Você sai com um número claro e um plano simples para ajustar suas retiradas mês a mês, com tranquilidade e sem comprometer o caixa do seu negócio.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FORM (centered narrow) -->\n  <section id=\"captura\" style=\"padding:clamp(56px,9vw,112px) clamp(20px,5vw,64px); background:#EAE2D4;\">\n    <div style=\"max-width:540px; margin:0 auto; text-align:center;\">\n      <span data-reveal=\"\" style=\"display:inline-block; font-size:11px; font-weight:500; letter-spacing:0.22em; text-transform:uppercase; color:#B68B22;\">Libere seu acesso<\u002Fspan>\n      <h2 data-reveal=\"\" data-reveal-delay=\"80\" style=\"font-family:'Cormorant Garamond',serif; font-weight:400; font-size:clamp(28px,4.2vw,44px); line-height:1.1; color:#1A1714; margin:18px 0 0; text-transform:lowercase;\">quero acessar o guia de <span style=\"white-space:nowrap;\">pró-labore<\u002Fspan><\u002Fh2>\n      <p data-reveal=\"\" data-reveal-delay=\"140\" style=\"font-size:14px; font-weight:300; color:#7A7268; margin:20px 0 clamp(34px,5vw,48px);\">Preencha seus dados abaixo e receba o material gratuito:<\u002Fp>\n\n      <form onsubmit=\"{{ submit }}\" data-reveal=\"\" data-reveal-delay=\"200\" style=\"display:flex; flex-direction:column; gap:24px; text-align:left;\">\n        <div style=\"display:flex; flex-direction:column; gap:9px;\">\n          <label style=\"font-size:11px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; color:#B68B22;\">Nome<\u002Flabel>\n          <input type=\"text\" name=\"nome\" value=\"{{ nome }}\" onchange=\"{{ onField }}\" placeholder=\"Como posso te chamar?\" style=\"width:100%; background:transparent; border:none; border-bottom:1px solid rgba(26,23,20,0.2); padding:8px 0; font-size:16px; font-weight:300; color:#1A1714; outline:none; transition:border-color .3s ease;\" style-focus=\"border-bottom-color:#C9A02A;\">\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:9px;\">\n          <label style=\"font-size:11px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; color:#B68B22;\">E-mail<\u002Flabel>\n          <input type=\"email\" name=\"email\" value=\"{{ email }}\" onchange=\"{{ onField }}\" placeholder=\"Seu melhor e-mail\" style=\"width:100%; background:transparent; border:none; border-bottom:1px solid rgba(26,23,20,0.2); padding:8px 0; font-size:16px; font-weight:300; color:#1A1714; outline:none; transition:border-color .3s ease;\" style-focus=\"border-bottom-color:#C9A02A;\">\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:9px;\">\n          <label style=\"font-size:11px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; color:#B68B22;\">WhatsApp<\u002Flabel>\n          <input type=\"tel\" name=\"whatsapp\" value=\"{{ whatsapp }}\" onchange=\"{{ onField }}\" placeholder=\"(00) 00000-0000\" style=\"width:100%; background:transparent; border:none; border-bottom:1px solid rgba(26,23,20,0.2); padding:8px 0; font-size:16px; font-weight:300; color:#1A1714; outline:none; transition:border-color .3s ease;\" style-focus=\"border-bottom-color:#C9A02A;\">\n        <\u002Fdiv>\n        <button type=\"submit\" disabled=\"{{ loading }}\" style=\"margin-top:12px; height:56px; background:#1A1714; color:#F4F0E8; border:none; font-size:11px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; cursor:pointer; transition:background .35s ease; display:flex; align-items:center; justify-content:center; gap:10px;\" style-hover=\"background:#2D2A26;\">\n          <sc-if value=\"{{ loading }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:inline-flex; align-items:center; gap:9px;\"><span style=\"width:13px; height:13px; border:2px solid rgba(244,240,232,0.4); border-top-color:#F4F0E8; border-radius:50%; display:inline-block; animation:brunaSpin .7s linear infinite;\"><\u002Fspan>Enviando…<\u002Fspan><\u002Fsc-if>\n          <sc-if value=\"{{ notLoading }}\" hint-placeholder-val=\"{{ true }}\"><span>Acessar o material agora!<\u002Fspan><\u002Fsc-if>\n        <\u002Fbutton>\n      <\u002Fform>\n\n      <sc-if value=\"{{ hasFeedback }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"{{ feedbackStyle }}\">{{ feedbackMsg }}<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <p style=\"font-size:11px; font-weight:300; color:rgba(26,23,20,0.32); margin:22px 0 0; letter-spacing:0.04em;\">Sem spam. Seus dados estão seguros.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CTA FINAL (moss) -->\n  <section style=\"padding:clamp(64px,10vw,128px) clamp(20px,5vw,64px); background:#5C6A4E;\">\n    <div style=\"max-width:760px; margin:0 auto; text-align:center;\">\n      <div data-reveal=\"\" style=\"width:36px; height:1px; background:#F4F0E8; opacity:0.4; margin:0 auto 30px;\"><\u002Fdiv>\n      <h2 data-reveal=\"\" data-reveal-delay=\"80\" style=\"font-family:'Cormorant Garamond',serif; font-weight:400; font-size:clamp(28px,5vw,54px); line-height:1.12; color:#F4F0E8; margin:0 0 22px; text-wrap:balance;\">Você merece um negócio que financie seus sonhos, não que roube suas <em style=\"font-style:italic; opacity:0.66;\">noites de sono.<\u002Fem><\u002Fh2>\n      <p data-reveal=\"\" data-reveal-delay=\"160\" style=\"font-size:clamp(14px,1.6vw,17px); font-weight:300; color:#F4F0E8; opacity:0.66; margin:0 0 34px;\">Esse é o primeiro passo.<\u002Fp>\n      <a data-reveal=\"\" data-reveal-delay=\"220\" href=\"#captura\" style=\"display:inline-block; height:56px; line-height:56px; padding:0 clamp(28px,4vw,42px); background:#F4F0E8; color:#1A1714; font-size:11px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; text-decoration:none; transition:opacity .3s ease, transform .3s ease;\" style-hover=\"opacity:0.86; transform:translateY(-2px);\">Baixar calculadora gratuita →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"padding:clamp(22px,3vw,30px) clamp(20px,5vw,64px); background:#2A2723; display:flex; flex-wrap:wrap; gap:16px; justify-content:space-between; align-items:center;\">\n    <span style=\"font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:400; font-size:clamp(16px,2vw,19px); color:#F4F0E8; opacity:0.5;\">Money2Women<\u002Fspan>\n    <div style=\"display:flex; align-items:center; gap:18px;\">\n      <a href=\"https://instagram.com/eibrunadossantos\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"display:inline-flex; color:#F4F0E8; opacity:0.5; transition:opacity .3s ease; text-decoration:none;\" style-hover=\"opacity:1;\" title=\"Siga no Instagram\">\n        <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"2\" y=\"2\" width=\"20\" height=\"20\" rx=\"5\"><\u002Frect><circle cx=\"12\" cy=\"12\" r=\"4.2\"><\u002Fcircle><circle cx=\"17.4\" cy=\"6.6\" r=\"1\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><\u002Fsvg>\n      <\u002Fa>\n      <span style=\"font-size:11px; font-weight:300; letter-spacing:0.2em; text-transform:uppercase; color:#F4F0E8; opacity:0.28;\">por Bruna dos Santos<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    nome: '', email: '', whatsapp: '',\n    loading: false,\n    feedback: null,\n    scrolled: false,\n  };\n\n  componentDidMount() {\n    this._onScroll = () => {\n      const y = window.scrollY || document.documentElement.scrollTop || 0;\n      const s = y > 60;\n      if (s !== this.state.scrolled) this.setState({ scrolled: s });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._injectSpin();\n    this._initReveal();\n  }\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this._onScroll);\n    if (this._io) this._io.disconnect();\n  }\n\n  _injectSpin() {\n    if (document.getElementById('bruna-spin-kf')) return;\n    const st = document.createElement('style');\n    st.id = 'bruna-spin-kf';\n    st.textContent = '@keyframes brunaSpin{to{transform:rotate(360deg);}}';\n    document.head.appendChild(st);\n  }\n\n  _initReveal() {\n    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    const els = Array.from(document.querySelectorAll('[data-reveal]'));\n    if (reduce || !('IntersectionObserver' in window)) return;\n    els.forEach(el => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(24px)';\n      el.style.transition = 'opacity .9s cubic-bezier(.22,.61,.36,1), transform .9s cubic-bezier(.22,.61,.36,1)';\n      el.style.transitionDelay = (el.dataset.revealDelay || '0') + 'ms';\n      el.style.willChange = 'opacity, transform';\n    });\n    this._io = new IntersectionObserver((entries) => {\n      entries.forEach(en => {\n        if (en.isIntersecting) {\n          en.target.style.opacity = '1';\n          en.target.style.transform = 'none';\n          this._io.unobserve(en.target);\n        }\n      });\n    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n    els.forEach(el => this._io.observe(el));\n  }\n\n  onField(e) {\n    const { name, value } = e.target;\n    this.setState({ [name]: value });\n  }\n\n  validName(n) { return (n || '').trim().length >= 3; }\n  validWhats(p) { const c = (p || '').replace(/\\D/g, ''); return c.length === 11 || c.length === 13; }\n\n  async submit(e) {\n    e.preventDefault();\n    const { nome, email, whatsapp } = this.state;\n    if (!this.validName(nome)) { this.setState({ feedback: { type: 'error', message: 'Nome deve ter pelo menos 3 caracteres.' } }); return; }\n    if (!email.includes('@')) { this.setState({ feedback: { type: 'error', message: 'E-mail inválido.' } }); return; }\n    if (!this.validWhats(whatsapp)) { this.setState({ feedback: { type: 'error', message: 'WhatsApp deve ter 11 ou 13 dígitos.' } }); return; }\n\n    this.setState({ loading: true, feedback: null });\n    try {\n      // ── Integração de captura de leads ──────────────────────────────\n      // Webhook atual (Google Apps Script → planilha). Troque por Mailchimp /\n      // RD Station / ActiveCampaign / Brevo enviando para o endpoint deles.\n      const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbwa9-zojwzv8stTl9C0A11_7TGtFn-mMJVtc5Tl3kamMGK5EaVK3D-DoLOa7Xc704Uo/exec';\n      await fetch(WEBHOOK_URL, {\n        method: 'POST', mode: 'no-cors', cache: 'no-cache', redirect: 'follow',\n        headers: { 'Content-Type': 'text/plain;charset=utf-8' },\n        body: JSON.stringify({ nome, email, whatsapp })\n      });\n      this.setState({ feedback: { type: 'success', message: 'Sucesso! Você será redirecionada para o material.' }, nome: '', email: '', whatsapp: '' });\n      setTimeout(() => {\n        window.location.href = 'https://eibrunadossantos.notion.site/aula-gratuita-Pr-labore-o-sal-rio-da-empreendedora-338f4862617180f99f84f66e6e4a2d9f?source=copy_link';\n      }, 1500);\n    } catch (err) {\n      this.setState({ feedback: { type: 'error', message: 'Erro ao enviar. Tente novamente.' }, loading: false });\n    }\n  }\n\n  renderVals() {\n    const { scrolled, loading, feedback } = this.state;\n\n    const headerStyle = {\n      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 80,\n      display: 'flex', justifyContent: 'space-between', alignItems: 'center',\n      padding: 'clamp(16px,2.4vw,22px) clamp(20px,5vw,64px)',\n      background: scrolled ? 'rgba(244,240,232,0.92)' : 'transparent',\n      borderBottom: scrolled ? '1px solid rgba(26,23,20,0.1)' : '1px solid transparent',\n      backdropFilter: scrolled ? 'blur(8px)' : 'none',\n      transition: 'background .4s ease, border-color .4s ease',\n    };\n\n    const fbBase = {\n      marginTop: '20px', padding: '14px 16px', fontSize: '13px', fontWeight: 400,\n      borderRadius: '2px', lineHeight: 1.5, textAlign: 'left',\n    };\n    const feedbackStyle = feedback && feedback.type === 'success'\n      ? Object.assign({}, fbBase, { background: 'rgba(92,106,78,0.12)', color: '#4A553C', border: '1px solid rgba(92,106,78,0.3)' })\n      : Object.assign({}, fbBase, { background: 'rgba(158,75,75,0.1)', color: '#8A3B3B', border: '1px solid rgba(158,75,75,0.28)' });\n\n    return {\n      headerStyle,\n      headerTextColor: scrolled ? '#1A1714' : '#F4F0E8',\n      headerSubColor: scrolled ? '#8A8073' : 'rgba(244,240,232,0.62)',\n      nome: this.state.nome, email: this.state.email, whatsapp: this.state.whatsapp,\n      onField: (e) => this.onField(e),\n      submit: (e) => this.submit(e),\n      loading: !!loading, notLoading: !loading,\n      hasFeedback: !!feedback,\n      feedbackMsg: feedback ? feedback.message : '',\n      feedbackStyle,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
